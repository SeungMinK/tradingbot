name: Chromatic Visual Regression Tests

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "admin/**"
      - ".github/workflows/chromatic.yml"

jobs:
  chromatic:
    name: Chromatic VRT
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Chromatic은 git history 필요

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install deps
        working-directory: admin
        run: npm ci

      - name: Build Storybook
        working-directory: admin
        run: npm run build-storybook
        # build-storybook script가 있어야. (Storybook 도입 후 추가)

      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: admin
          storybookBuildDir: storybook-static
          exitOnceUploaded: true  # 업로드 후 즉시 종료 (PR 워크플로우 빠름)
          autoAcceptChanges: main  # main 브랜치는 자동 수락
